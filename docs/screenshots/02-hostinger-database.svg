<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Annotated Hostinger database setup screenshot">
  <rect width="1280" height="760" fill="#f5f6fb"/>
  <rect x="0" y="0" width="1280" height="74" fill="#111827"/>
  <text x="36" y="47" font-family="Inter,Arial" font-size="26" font-weight="800" fill="#fff">Hostinger Databases</text>
  <rect x="46" y="112" width="548" height="560" rx="22" fill="#fff" stroke="#d7dce8"/>
  <text x="82" y="162" font-family="Inter,Arial" font-size="24" font-weight="900" fill="#111827">Create MySQL Database</text>
  <rect x="82" y="204" width="470" height="58" rx="12" fill="#f9fafb" stroke="#d7dce8"/>
  <text x="106" y="240" font-family="Inter,Arial" font-size="16" fill="#374151">Database name: u123456789_rtbo</text>
  <rect x="82" y="286" width="470" height="58" rx="12" fill="#f9fafb" stroke="#d7dce8"/>
  <text x="106" y="322" font-family="Inter,Arial" font-size="16" fill="#374151">Username: u123456789_admin</text>
  <rect x="82" y="368" width="470" height="58" rx="12" fill="#f9fafb" stroke="#d7dce8"/>
  <text x="106" y="404" font-family="Inter,Arial" font-size="16" fill="#374151">Password: strong private password</text>
  <rect x="82" y="470" width="180" height="54" rx="999" fill="#f58220"/>
  <text x="126" y="504" font-family="Inter,Arial" font-size="16" font-weight="900" fill="#111">Create</text>
  <rect x="656" y="112" width="548" height="560" rx="22" fill="#fff" stroke="#d7dce8"/>
  <text x="692" y="162" font-family="Inter,Arial" font-size="24" font-weight="900" fill="#111827">Import database.sql</text>
  <rect x="692" y="204" width="470" height="330" rx="18" fill="#0b0b0b"/>
  <text x="726" y="254" font-family="Inter,Arial" font-size="18" font-weight="900" fill="#f58220">phpMyAdmin</text>
  <text x="726" y="302" font-family="Inter,Arial" font-size="16" fill="#e5e7eb">1. Select the empty RTBO database.</text>
  <text x="726" y="344" font-family="Inter,Arial" font-size="16" fill="#e5e7eb">2. Click Import.</text>
  <text x="726" y="386" font-family="Inter,Arial" font-size="16" fill="#e5e7eb">3. Choose database.sql.</text>
  <text x="726" y="428" font-family="Inter,Arial" font-size="16" fill="#e5e7eb">4. Click Go.</text>
  <rect x="692" y="570" width="346" height="54" rx="999" fill="#f58220"/>
  <text x="724" y="604" font-family="Inter,Arial" font-size="16" font-weight="900" fill="#111">Save DB credentials for api/.env</text>
</svg>
