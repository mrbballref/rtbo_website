  <text x="116" y="396" font-family="Menlo,Consolas,monospace" font-size="18" fill="#e5e7eb">DB_PASS=your_hostinger_database_password</text>
  <text x="116" y="456" font-family="Menlo,Consolas,monospace" font-size="18" fill="#fbbf24">STRIPE_SECRET_KEY=sk_live_...</text>
