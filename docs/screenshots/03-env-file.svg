  <text x="116" y="576" font-family="Menlo,Consolas,monospace" font-size="18" fill="#fbbf24">PAYPAL_MODE=live</text>
  <rect x="780" y="80" width="370" height="70" rx="999" fill="#f58220"/>
  <text x="826" y="124" font-family="Inter,Arial" font-size="18" font-weight="900" fill="#111">Server-only configuration</text>
