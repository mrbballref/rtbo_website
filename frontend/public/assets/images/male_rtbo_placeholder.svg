    <path d="M96 72 L256 50 L416 72 L395 392 Q374 507 256 610 Q138 507 117 392 Z" fill="none" stroke="url(#orange)" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <g opacity=".98">
