    <path d="M190 246 C190 199 216 168 256 168 C296 168 322 199 322 246 C322 291 294 334 256 334 C218 334 190 291 190 246 Z" fill="url(#body)" stroke="#20252a" stroke-width="4"/>
    <path d="M189 206 C203 168 228 151 256 151 C293 151 319 174 326 213 C312 196 299 191 284 185 C249 173 219 182 189 206 Z" fill="#353a3f" stroke="#1f2327" stroke-width="3"/>
    <path d="M186 248 C176 247 169 254 169 268 C169 284 178 292 189 288 Z" fill="#4a5056" stroke="#20252a" stroke-width="3"/>
    <path d="M326 248 C336 247 343 254 343 268 C343 284 334 292 323 288 Z" fill="#4a5056" stroke="#20252a" stroke-width="3"/>
    <path d="M220 374 C230 405 246 423 256 423 C266 423 282 405 292 374" fill="none" stroke="#2c3136" stroke-width="8" stroke-linecap="round"/>
