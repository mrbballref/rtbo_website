<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 704" role="img" aria-labelledby="title desc">
  <title id="title">RTBO female profile placeholder</title>
  <desc id="desc">A transparent Raising The Bar Officiating shield placeholder with a female profile silhouette.</desc>
  <defs>
    <linearGradient id="chrome" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset=".18" stop-color="#595959"/>
      <stop offset=".38" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#111111"/>
      <stop offset=".72" stop-color="#cfcfcf"/>
      <stop offset="1" stop-color="#2b2b2b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#c1121f"/>
      <stop offset=".48" stop-color="#c44d59"/>
      <stop offset="1" stop-color="#7f0d16"/>
    </linearGradient>
    <linearGradient id="body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#747a80"/>
      <stop offset="1" stop-color="#41464b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity=".5"/>
    </filter>
  </defs>

