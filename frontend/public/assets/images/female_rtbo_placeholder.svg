    <path d="M173 241 C173 184 208 148 256 148 C304 148 339 184 339 241 C339 291 304 337 256 337 C208 337 173 291 173 241 Z" fill="url(#body)" stroke="#20252a" stroke-width="4"/>
    <path d="M172 238 C150 282 150 333 170 384 C178 349 184 318 194 289 C180 276 172 258 172 238 Z" fill="#383d42" stroke="#20252a" stroke-width="4"/>
    <path d="M340 238 C362 282 362 333 342 384 C334 349 328 318 318 289 C332 276 340 258 340 238 Z" fill="#383d42" stroke="#20252a" stroke-width="4"/>
    <path d="M177 211 C194 167 224 143 260 143 C302 143 333 171 341 217 C312 185 289 178 258 178 C222 178 196 189 177 211 Z" fill="#353a3f" stroke="#1f2327" stroke-width="3"/>
