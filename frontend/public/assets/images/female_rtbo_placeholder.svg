    <path d="M67 486 Q256 454 445 486 L431 533 Q256 506 81 533 Z" fill="#141414" stroke="url(#orange)" stroke-width="3"/>
    <text x="256" y="519" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="38" fill="#f4f4f4" stroke="#111" stroke-width="2" letter-spacing="1">RAISING THE BAR</text>
    <text x="256" y="553" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="23" fill="#f4f4f4" letter-spacing="5">OFFICIATING</text>
    <text x="256" y="601" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="26" fill="#ff9a1f" letter-spacing="8">***</text>
